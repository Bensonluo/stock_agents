# Stock Agents - Docker Compose Configuration
#
# 实际架构：
# - 后端: FastAPI + SQLite (data/analysis_history.db)
# - 前端: Next.js 14
#
# 使用方式：
#   开发模式: docker-compose up -d
#   查看日志: docker-compose logs -f
#   停止服务: docker-compose down

services:
  # ===========================================
  # 后端 API 服务 (FastAPI + SQLite)
  # ===========================================
  api:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile
    container_name: stock_agent_api
    env_file:
      - .env
    ports:
      - "8001:8000"  # 修改为 8001，避免与 rag_chatbot 冲突
    volumes:
      # 持久化 SQLite 数据库
      - ./data:/app/data
      # 持久化日志
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ===========================================
  # 前端服务 (Next.js 14)
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/stock-api
    container_name: stock_agent_frontend
    environment:
      - NEXT_PUBLIC_API_URL=/stock-api
    ports:
      - "3002:3000"  # 修改为 3002，避免与 portfolio-fe 冲突
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/stock"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

# ===========================================
# 数据卷（用于持久化）
# ===========================================
volumes:
  api_data:
  api_logs:
